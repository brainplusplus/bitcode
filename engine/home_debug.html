<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — LowCode</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);display:flex;justify-content:center;align-items:center;min-height:100vh;padding:1rem;}
.login-card{background:#fff;padding:2.5rem;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,0.3);width:100%;max-width:400px;}
.login-brand{display:flex;align-items:center;gap:0.75rem;margin-bottom:0.5rem;}
.login-brand svg{width:36px;height:36px;}
.login-brand span{font-size:1.3rem;font-weight:700;color:#1a1a2e;}
.login-subtitle{color:#718096;margin-bottom:1.75rem;font-size:0.9rem;}
.login-error{background:#FEE2E2;color:#991B1B;padding:0.75rem;border-radius:8px;margin-bottom:1rem;font-size:0.85rem;}
.login-label{display:block;font-weight:600;margin-bottom:0.3rem;font-size:0.85rem;color:#333;}
.login-input{width:100%;padding:0.7rem 0.9rem;border:1.5px solid #e2e8f0;border-radius:8px;font-size:0.95rem;margin-bottom:1rem;outline:none;transition:border 0.2s,box-shadow 0.2s;font-family:inherit;}
.login-input:focus{border-color:#3B82F6;box-shadow:0 0 0 3px rgba(59,130,246,0.15);}
.login-btn{width:100%;padding:0.75rem;background:#3B82F6;color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:background 0.2s;font-family:inherit;}
.login-btn:hover{background:#2563EB;}
.login-footer{text-align:center;margin-top:1.5rem;font-size:0.8rem;color:#a0aec0;}
.login-footer a{color:#3B82F6;}
</style>
</head>
<body>
<div class="login-card">
  <div class="login-brand">
    <svg viewBox="0 0 36 36" fill="none"><rect width="36" height="36" rx="8" fill="#3B82F6"/><path d="M10 10h5v16h-5V10zm11 5h5v11h-5V15z" fill="#fff"/></svg>
    <span>LowCode</span>
  </div>
  <p class="login-subtitle">Sign in to your workspace</p>
  
  <form method="POST" action="/app/login">
    <label class="login-label">Username</label>
    <input class="login-input" type="text" name="username" placeholder="admin" autofocus required>
    <label class="login-label">Password</label>
    <input class="login-input" type="password" name="password" placeholder="••••••••" required>
    <button class="login-btn" type="submit">Sign In</button>
  </form>
  <div class="login-footer">Powered by LowCode Engine</div>
</div>
</body>
</html>
