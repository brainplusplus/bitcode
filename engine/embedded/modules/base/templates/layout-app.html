<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{.Title}} — BitCode</title>
<style>
:root{--primary:#6366F1;--primary-dark:#4F46E5;--primary-light:#EEF2FF;--body-bg:#F8FAFC;--card-bg:#fff;--text:#1E293B;--text-secondary:#475569;--text-muted:#94A3B8;--border:#E2E8F0;--border-light:#F1F5F9;--radius:8px;--radius-lg:12px;--shadow-xs:0 1px 2px rgba(0,0,0,0.04);--shadow:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.03);--shadow-md:0 4px 6px -1px rgba(0,0,0,0.07),0 2px 4px -2px rgba(0,0,0,0.04);--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;--transition:150ms ease}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--body-bg);color:var(--text);line-height:1.5;font-size:14px;-webkit-font-smoothing:antialiased}
a{color:var(--primary);text-decoration:none}
.bc-topbar{background:#fff;border-bottom:1px solid var(--border-light);padding:0 2rem;height:48px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.bc-topbar-left{display:flex;align-items:center;gap:0.6rem}
.bc-topbar-logo svg{width:24px;height:24px}
.bc-topbar-title{font-size:0.9rem;font-weight:700;color:var(--text);letter-spacing:-0.02em}
.bc-topbar-right{display:flex;align-items:center;gap:0.6rem}
.bc-topbar-user{display:flex;align-items:center;gap:0.4rem;padding:0.25rem 0.5rem 0.25rem 0.25rem;border-radius:6px;font-size:0.8rem;font-weight:500;color:var(--text-secondary);cursor:pointer;transition:background var(--transition);border:none;background:transparent;font-family:var(--font)}
.bc-topbar-user:hover{background:var(--border-light)}
.bc-topbar-avatar{width:26px;height:26px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:600}
.bc-topbar-link{padding:0.3rem 0.6rem;border-radius:6px;font-size:0.78rem;font-weight:500;border:1px solid var(--border);background:#fff;color:var(--text-muted);cursor:pointer;transition:all var(--transition);text-decoration:none;display:inline-flex;align-items:center;gap:0.25rem}
.bc-topbar-link:hover{background:var(--border-light);color:var(--text)}
.bc-app-main{max-width:960px;margin:0 auto;padding:2.5rem 1.5rem}
</style>
</head>
<body>
<div class="bc-topbar">
  <div class="bc-topbar-left">
    <div class="bc-topbar-logo">
      <svg viewBox="0 0 24 24" fill="none"><rect width="24" height="24" rx="6" fill="#6366F1"/><path d="M7 7h3.5v10H7V7zm6.5 3H17v7h-3.5v-7z" fill="#fff"/></svg>
    </div>
    <span class="bc-topbar-title">BitCode</span>
  </div>
  <div class="bc-topbar-right">
    {{if .Username}}
    <div class="bc-topbar-user">
      <div class="bc-topbar-avatar">{{truncate .Username 1}}</div>
      {{.Username}}
    </div>
    <a class="bc-topbar-link" href="/app/login" onclick="document.cookie='token=;path=/;max-age=0'">Sign out</a>
    {{end}}
  </div>
</div>
<main class="bc-app-main">
{{.Content}}
</main>
</body>
</html>
