<style>
.bc-home-header{margin-bottom:2.5rem;text-align:center}
.bc-home-header h1{font-size:1.5rem;font-weight:700;color:#1E293B;letter-spacing:-0.02em}
.bc-home-header p{color:#94A3B8;margin-top:0.3rem;font-size:0.88rem}
.bc-app-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1rem;max-width:720px;margin:0 auto}
.bc-app-card{background:#fff;border:1px solid #F1F5F9;border-radius:12px;padding:1.5rem 1rem;text-align:center;cursor:pointer;transition:all 150ms ease;text-decoration:none;color:#1E293B;display:flex;flex-direction:column;align-items:center;gap:0.65rem}
.bc-app-card:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,0.08);border-color:#E2E8F0}
.bc-app-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff}
.bc-app-name{font-weight:600;font-size:0.88rem}
.bc-app-count{font-size:0.72rem;color:#94A3B8}
</style>

<div class="bc-home-header">
  <h1>Welcome back, {{.Username}}</h1>
  <p>Select an application to get started</p>
</div>

<div class="bc-app-grid">
  {{range .ModuleCards}}
  <a class="bc-app-card" href="/app/{{.FirstView}}">
    <div class="bc-app-icon" style="background:{{.Color}}">{{.IconSVG}}</div>
    <div class="bc-app-name">{{.Label}}</div>
    <div class="bc-app-count">{{.ViewCount}} views</div>
  </a>
  {{end}}
  <a class="bc-app-card" href="/admin">
    <div class="bc-app-icon" style="background:#94A3B8">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="#fff"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/></svg>
    </div>
    <div class="bc-app-name">Admin</div>
    <div class="bc-app-count">System administration</div>
  </a>
</div>
