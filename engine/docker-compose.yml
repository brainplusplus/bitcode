version: '3.8'

services:
  engine:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=bitcode
      - DB_PASSWORD=bitcode
      - DB_NAME=bitcode
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=change-me-in-production-32chars!
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./modules:/app/modules

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=bitcode
      - POSTGRES_PASSWORD=bitcode
      - POSTGRES_DB=bitcode
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bitcode"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
