<div class="bc-card">
  <div class="bc-card-header">
    <h2>{{.title}}</h2>
    <div class="bc-actions">
      {{if .filters}}
      <div class="bc-search-box">
        <svg width="14" height="14" viewBox="0 0 20 20" fill="#999"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg>
        <input type="text" placeholder="Search..." id="bc-search">
      </div>
      {{end}}
      {{if .actions}}
      <div style="display:flex;gap:0.4rem;">
        {{range .actions}}
        <a class="bc-btn {{if eq .Variant "primary"}}bc-btn-primary{{else if eq .Variant "danger"}}bc-btn-danger{{else}}bc-btn-secondary{{end}}" href="#">{{.Label}}</a>
        {{end}}
      </div>
      {{end}}
    </div>
  </div>
  {{if .records}}
  <div style="overflow-x:auto;">
    <table class="bc-table">
      <thead>
        <tr>
          {{range .fields}}<th>{{.}}</th>{{end}}
        </tr>
      </thead>
      <tbody>
        {{range .records}}
        <tr>
          {{$rec := .}}
          {{range $.fields}}
          <td>{{index $rec .}}</td>
          {{end}}
        </tr>
        {{end}}
      </tbody>
    </table>
  </div>
  {{else}}
  <div class="bc-empty">
    <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5 3a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2V5a2 2 0 00-2-2H5zm0 2h10v7h-2l-1 2H8l-1-2H5V5z" clip-rule="evenodd"/></svg>
    <p>No records found</p>
  </div>
  {{end}}
</div>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var search = document.getElementById('bc-search');
  if (!search) return;
  search.addEventListener('input', function() {
    var q = this.value.toLowerCase();
    var rows = document.querySelectorAll('.bc-table tbody tr');
    rows.forEach(function(row) {
      row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  });
});
</script>
