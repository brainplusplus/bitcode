<header class="lc-navbar">
  <div class="lc-navbar-left">
    <button class="lc-menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 5a1 1 0 011-1h6a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"/></svg>
    </button>
    <div class="lc-breadcrumb">
      <a href="/app/home">
        <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor" style="vertical-align:-2px;opacity:0.5"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg>
      </a>
      {{if .Module}}<span class="sep">/</span><span style="text-transform:capitalize">{{.Module}}</span>{{end}}
      {{if .Title}}<span class="sep">/</span><span style="font-weight:500;color:var(--text)">{{.Title}}</span>{{end}}
    </div>
  </div>
  <div class="lc-navbar-right">
    <div style="position:relative">
      <button class="lc-app-switcher-btn" onclick="toggleDropdown(this,'lc-app-switcher-dropdown')" title="Apps">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="4" height="4" rx="1"/><rect x="6" y="1" width="4" height="4" rx="1"/><rect x="11" y="1" width="4" height="4" rx="1"/><rect x="1" y="6" width="4" height="4" rx="1"/><rect x="6" y="6" width="4" height="4" rx="1"/><rect x="11" y="6" width="4" height="4" rx="1"/><rect x="1" y="11" width="4" height="4" rx="1"/><rect x="6" y="11" width="4" height="4" rx="1"/><rect x="11" y="11" width="4" height="4" rx="1"/></svg>
      </button>
      <div class="lc-app-switcher-dropdown">
        <a href="/app/home">
          <svg width="14" height="14" viewBox="0 0 20 20" fill="var(--text-muted)"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg>
          All Apps
        </a>
        {{range .Menu}}
        {{range .Children}}
        <a href="/app/{{.ViewPath}}">
          <svg width="14" height="14" viewBox="0 0 20 20" fill="var(--text-muted)"><circle cx="10" cy="10" r="3"/></svg>
          {{.Label}}
        </a>
        {{end}}
        {{end}}
        <div style="height:1px;background:var(--border-light);margin:0.35rem 0"></div>
        <a href="/admin">
          <svg width="14" height="14" viewBox="0 0 20 20" fill="var(--text-muted)"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/></svg>
          Admin Panel
        </a>
      </div>
    </div>
    {{if .Username}}
    <div style="position:relative">
      <button class="lc-user-btn" onclick="toggleDropdown(this,'lc-user-dropdown')">
        <div class="lc-user-avatar">{{truncate .Username 1}}</div>
        {{.Username}}
        <svg width="12" height="12" viewBox="0 0 20 20" fill="currentColor" style="opacity:0.4"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
      </button>
      <div class="lc-user-dropdown">
        <a href="/admin">
          <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor" style="opacity:0.4"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-6-3a2 2 0 11-4 0 2 2 0 014 0zm-2 4a5 5 0 00-4.546 2.916A5.986 5.986 0 0010 16a5.986 5.986 0 004.546-2.084A5 5 0 0010 11z" clip-rule="evenodd"/></svg>
          Admin Panel
        </a>
        <div class="lc-divider"></div>
        <a href="/app/login" onclick="document.cookie='token=;path=/;max-age=0'" style="color:var(--danger)">
          <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor" style="opacity:0.5"><path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clip-rule="evenodd"/></svg>
          Sign out
        </a>
      </div>
    </div>
    {{end}}
  </div>
</header>
