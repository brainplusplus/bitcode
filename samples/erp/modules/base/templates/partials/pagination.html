{{if gt .TotalPages 1}}
<div style="display:flex;align-items:center;justify-content:space-between;padding:0.75rem 1rem;border-top:1px solid var(--border);">
  <div class="lc-page-info">Showing {{.Page}} of {{.TotalPages}} pages ({{.Total}} records)</div>
  <div class="lc-pagination">
    {{if gt .Page 1}}<a class="lc-page-btn" href="?page={{sub .Page 1}}">‹ Prev</a>{{end}}
    {{range seq 1 .TotalPages}}
    <a class="lc-page-btn{{if eq . $.Page}} active{{end}}" href="?page={{.}}">{{.}}</a>
    {{end}}
    {{if lt .Page .TotalPages}}<a class="lc-page-btn" href="?page={{add .Page 1}}">Next ›</a>{{end}}
  </div>
</div>
{{end}}
