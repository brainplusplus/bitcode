<div class="bc-stats">
  <div class="bc-stat-card">
    <div class="bc-stat-value" style="color:#10B981;">{{if .active_employees}}{{len .active_employees}}{{else}}0{{end}}</div>
    <div class="bc-stat-label">Active Employees</div>
  </div>
  <div class="bc-stat-card">
    <div class="bc-stat-value" style="color:#F59E0B;">{{if .pending_leaves}}{{len .pending_leaves}}{{else}}0{{end}}</div>
    <div class="bc-stat-label">Pending Leave Requests</div>
  </div>
  <div class="bc-stat-card">
    <div class="bc-stat-value" style="color:#3B82F6;">{{if .open_positions}}{{len .open_positions}}{{else}}0{{end}}</div>
    <div class="bc-stat-label">Open Positions</div>
  </div>
</div>
