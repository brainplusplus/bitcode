{{if eq .status "won"}}<span class="lc-badge lc-badge-green">{{.status}}</span>
{{else if eq .status "lost"}}<span class="lc-badge lc-badge-red">{{.status}}</span>
{{else if eq .status "new"}}<span class="lc-badge lc-badge-blue">{{.status}}</span>
{{else if eq .status "qualified"}}<span class="lc-badge lc-badge-yellow">{{.status}}</span>
{{else}}<span class="lc-badge lc-badge-gray">{{.status}}</span>
{{end}}
