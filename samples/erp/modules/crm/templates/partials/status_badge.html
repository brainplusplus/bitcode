{{if eq .status "won"}}<span class="bc-badge bc-badge-green">{{.status}}</span>
{{else if eq .status "lost"}}<span class="bc-badge bc-badge-red">{{.status}}</span>
{{else if eq .status "new"}}<span class="bc-badge bc-badge-blue">{{.status}}</span>
{{else if eq .status "qualified"}}<span class="bc-badge bc-badge-yellow">{{.status}}</span>
{{else}}<span class="bc-badge bc-badge-gray">{{.status}}</span>
{{end}}
