root = "."
tmp_dir = "tmp"

[build]
  cmd = "cmd /c build.bat"
  bin = "../../engine/bin/engine.exe"
  full_bin = "../../engine/bin/engine.exe"
  include_ext = ["go", "json", "html", "yaml", "toml"]
  include_dir = ["../../engine", "modules"]
  exclude_dir = ["tmp", "vendor", "node_modules", "uploads"]
  exclude_regex = ["_test\\.go$"]
  delay = 1000
  stop_on_error = true
  send_interrupt = true
  kill_delay = 3000

[log]
  time = false

[misc]
  clean_on_exit = true
